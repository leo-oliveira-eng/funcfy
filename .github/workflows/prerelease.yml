name: "Prerelease"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: "src/Funcfy/Funcfy.csproj"
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}/output
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_FEED: https://nuget.pkg.github.com/leo-oliveira-eng/

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        ref: ${{ github.ref }}
        fetch-depth: 0

    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: setup .Net
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: restore
      run: dotnet restore

    - name: build
      run: dotnet build -c Release --no-restore

    - name: Determine package version
      id: version
      shell: bash
      run: |
        tag="${GITHUB_REF_NAME}"

        if [[ -z "$tag" ]]; then
          echo "Unable to determine the tag name from the workflow context." >&2
          exit 1
        fi

        clean_tag="${tag#v}"
        version="${clean_tag}-rc.${GITHUB_RUN_NUMBER}"

        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Pack
      run: |
        dotnet pack ${{ env.PROJECT_PATH }} \
        --no-restore \
        --no-build \
        -c Release \
        --include-symbols \
        --include-source \
        --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }} \
        /p:PackageVersion=${{ steps.version.outputs.version }}

    - name: Push to GitHub Packages
      run: |
        dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg \
        --source ${{ env.GITHUB_FEED }} \
        --api-key ${{ env.GITHUB_TOKEN }} \
        --skip-duplicate
