name: "Prerelease"

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  
  PROJECT_PATH: 'src/Funcfy/Funcfy.csproj'
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}/output

  GITHUB_USER: leo-oliveira-eng
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_FEED: https://nuget.pkg.github.com/leo-oliveira-eng/
  GITHUB_PAT: ${{ secrets.PAT }}

jobs:
  pack:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
    - name: Checkout  
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.merge_commit_sha }}
        fetch-depth: 0

    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: setup .Net
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: restore
      run: dotnet restore

    - name: build
      run: dotnet build -c Release --no-restore

    - name: Determine version bump
      id: bump
      shell: bash
      run: |
        labels="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
        bump="patch"

        if [[ " $labels " == *" major "* ]]; then
          bump="major"
        elif [[ " $labels " == *" minor "* ]]; then
          bump="minor"
        fi

        echo "bump=$bump" >> "$GITHUB_OUTPUT"

    - name: Create SemVer tag
      id: semver
      uses: leo-oliveira-eng/tag-semver-action@0.1.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        allowed-base-branches: main
        tag-prefix: v
        major-label: major
        minor-label: minor
        default-bump: ${{ steps.bump.outputs.bump }}

    - name: Determine package version
      id: version
      shell: bash
      run: |
        tag="${{ steps.semver.outputs.next-tag }}"

        if [[ -z "$tag" ]]; then
          echo "Unable to determine the release tag from the SemVer action output." >&2
          exit 1
        fi

        clean_tag="${tag#v}"
        version="${clean_tag}-rc.${GITHUB_RUN_NUMBER}"

        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Pack
      run: |
        dotnet pack ${{ env.PROJECT_PATH }} \
        --no-restore \
        --no-build \
        -c Release \
        --include-symbols \
        --include-source \
        --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }} \
        /p:PackageVersion=${{ steps.version.outputs.version }}

    - name: Push to GitHub Packages
      run: |
        dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg \
        --source ${{ env.GITHUB_FEED }} \
        --api-key ${{ env.GITHUB_TOKEN }} \
        --skip-duplicate
