codecov:
  require_ci_to_pass: true

github_checks:
  annotations: true

coverage:
  precision: 2
  round: down
  range: "90...100"
  status:
    project:
      default:
        target: 99%
        threshold: 0.25%
        informational: false
        if_not_found: failure
    patch:
      default:
        target: 100%
        threshold: 0%
        only_pulls: true
        if_not_found: failure

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: true

ignore:
  - "tests/**/*"
  - "docs/**/*"
  - ".github/**/*"
  - "images/**/*"
